[env:pico]
platform = raspberrypi
board = pico
framework = arduino
; PIOを利用したエンコーダーライブラリを追加
lib_deps = 
    dantudose/PioEncoder @ ^1.0.1
platform_packages = 
    toolchain-gccarmnoneeabi@~1.90301.0